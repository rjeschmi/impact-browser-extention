<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: #f8f9fa;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #16213e;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e9ecef;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #51cf66;
    }
    .status-dot.paused { background: #ff922b; }
    .status-dot.offline { background: #ff6b6b; }
    .info {
      padding: 8px 12px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e9ecef;
      margin-bottom: 12px;
      font-size: 13px;
      color: #495057;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-toggle {
      background: #e9ecef;
      color: #495057;
    }
    .btn-toggle:hover { background: #dee2e6; }
    .btn-dashboard {
      background: #228be6;
      color: white;
    }
    .btn-dashboard:hover { background: #1c7ed6; }
  </style>
</head>
<body>
  <h1>Impact</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
  <div class="info" id="info">Loading...</div>
  <button class="btn-toggle" id="toggleBtn">Pause Tracking</button>
  <button class="btn-dashboard" id="dashboardBtn">Open Dashboard</button>
  <script type="module" src="popup.ts"></script>
</body>
</html>
